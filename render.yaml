services:
  - type: web              # "web" (not worker) so Render assigns a public HTTPS URL
    name: nexus-gateway    # RENDER_EXTERNAL_URL is set automatically — bot.ts uses it for webhook
    runtime: node
    buildCommand: npm install
    startCommand: npm run start
    healthCheckPath: /health
    # Persistent disk for the Agoda hotel enrichment DB (agoda_hotels.sqlite, ~390MB) +
    # the city name -> city_id lookup JSON (~4.3MB). Neither ships in git — see
    # NOTES-agoda-hosting.md for how they get onto this disk. Disk survives redeploys;
    # it's NOT wiped when Render rebuilds the service.
    disk:
      name: agoda-data
      mountPath: /var/data
      sizeGB: 5
    envVars:
      # ── Agoda Affiliate Long Tail Search API ─────────────────────────────────
      - key: AGODA_SITE_ID
        sync: false          # your Agoda affiliate site ID (same one baked into landingURL)
      - key: AGODA_API_KEY
        sync: false          # from Affiliate_Lite_API_V2.0 partnership docs
      - key: AGODA_DB_PATH
        value: /var/data/agoda_hotels.sqlite
      - key: AGODA_CITY_LOOKUP_PATH
        value: /var/data/agoda_city_lookup.json

      # ── Retail product catalog (Shopee/iHerb — see product-db.ts, product-search.ts,
      #    product-refresh.ts). Same disk as the Agoda data above. Not in git.
      #    Unlike agoda_hotels.sqlite, this file is NEVER manually uploaded — the
      #    running service downloads the feed URLs below and rebuilds it itself on
      #    first boot (empty disk) and every ~24h after that. See product-refresh.ts
      #    for why this can't be a separate Render cron job (cron can't attach disks,
      #    and disks aren't shareable across services).
      - key: PRODUCTS_DB_PATH
        value: /var/data/products.sqlite

      # Shopee affiliate product feed URLs (from the "Shopee deeplinking" feed doc) —
      # only the countries you set here get ingested. Each URL embeds your affiliate
      # feed token, so treat it as a secret (sync: false, paste in Render dashboard).
      - key: SHOPEE_FEED_URL_SG
        sync: false
      - key: SHOPEE_FEED_URL_MY
        sync: false
      - key: SHOPEE_FEED_URL_PH
        sync: false
      - key: SHOPEE_FEED_URL_TH
        sync: false
      - key: SHOPEE_FEED_URL_TW
        sync: false
      - key: SHOPEE_FEED_URL_ID
        sync: false

      # iHerb affiliate product feed URL(s) (Involve Asia / Partnerize datafeed —
      # see the "iherb deeplinking" PDF for the dashboard link). Same secret handling.
      - key: IHERB_FEED_URL_SG
        sync: false
      - key: IHERB_FEED_URL_MY
        sync: false
      - key: IHERB_FEED_URL_PH
        sync: false

      # ── Charted Sea (live Lazada + commit-time live Shopee search — see
      #    lazada-search.ts, shopee-live-search.ts, shopee-price-check.ts) ─────────
      - key: CHARTEDSEA_API_TOKEN
        sync: false          # generate from console.chartedsea.com, paste in Render dashboard

      # ── Telegram ─────────────────────────────────────────────────────────────
      - key: TELEGRAM_BOT_TOKEN
        sync: false          # fill in Render dashboard

      # Auto-generated webhook secret — prevents spoofed updates from reaching the bot
      - key: WEBHOOK_SECRET
        generateValue: true

      # ── Virtuals Agent Compute ───────────────────────────────────────────────
      - key: VIRTUALS_API_KEY
        sync: false          # generate at app.virtuals.io → your agent → Compute

      # ── ACP client identity (acp-tester agent — hires the Laguna ACP provider) ─
      - key: ACP_CLIENT_WALLET
        sync: false          # acp-tester EVM address (0x114d...)
      - key: ACP_CLIENT_PRIVY_WALLET_ID
        sync: false          # acp-tester Privy wallet ID
      - key: ACP_CLIENT_PRIVY_SIGNER_PK
        sync: false          # acp-tester Privy signer private key

      # Wallet address of the running ACPLagunaTranslator provider
      - key: ACP_PROVIDER_ADDRESS
        sync: false

      # ── Laguna MCP (search / info / dashboard — direct calls) ────────────────
      - key: LAGUNA_MCP_URL
        value: https://agents.laguna.network/mcp

      # ── Runtime ──────────────────────────────────────────────────────────────
      - key: NODE_ENV
        value: production

  # Keep the web service warm — free tier spins down after 15min of inactivity
  - type: cron
    name: nexus-gateway-keepalive
    runtime: node
    buildCommand: echo ok
    startCommand: curl -sf https://nexus-gateway-1.onrender.com/health
    schedule: "*/5 * * * *"
